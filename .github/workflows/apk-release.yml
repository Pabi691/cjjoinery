name: Build and Release Flutter (Android + iOS)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────
  # JOB 1: Build Android APK
  # ────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # ────────────────────────────────────────────
  # JOB 2: Build iOS App
  # ────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ./mobile-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Zip iOS App Bundle
        run: |
          cd build/ios/iphoneos
          zip -r "$GITHUB_WORKSPACE/CJJoinery-iOS.zip" Runner.app
          echo "iOS app zipped successfully"

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: CJJoinery-iOS.zip
          retention-days: 14

  # ────────────────────────────────────────────
  # JOB 3: Create Combined Release
  # ────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets

      - name: Download iOS App
        uses: actions/download-artifact@v4
        with:
          name: ios-app
          path: release-assets

      - name: List Release Assets
        run: ls -la release-assets/

      - name: Create Combined Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/app-release.apk
            release-assets/CJJoinery-iOS.zip
          name: "CJ Joinery v${{ github.run_number }} – Android + iOS"
          tag_name: "v${{ github.run_number }}"
          body: |
            📱 **CJ Joinery Mobile App – Build #${{ github.run_number }}**

            ### Downloads
            - 🤖 **Android**: `app-release.apk` – Install directly on Android devices
            - 🍎 **iOS**: `CJJoinery-iOS.zip` – Contains the iOS app bundle

            ---
            > Auto-generated by GitHub Actions on push to `${{ github.ref_name }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
