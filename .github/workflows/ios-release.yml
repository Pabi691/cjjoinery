name: Build and Release Flutter iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ./mobile-app

    steps:
      - uses: actions/checkout@v4

      # ── Flutter SDK ──
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos || true

      # ── Apple Certificate & Provisioning (for signed builds) ──
      # These secrets must be added in GitHub repo → Settings → Secrets:
      #   IOS_P12_BASE64           – Base64 of your .p12 distribution certificate
      #   IOS_P12_PASSWORD         – Password for the .p12 file
      #   IOS_PROVISION_PROFILE    – Base64 of your .mobileprovision file
      #   IOS_KEYCHAIN_PASSWORD    – Any random password for the temp keychain
      #   IOS_TEAM_ID              – Your Apple Developer Team ID
      - name: Install Apple Certificate & Provisioning Profile
        if: env.HAS_SIGNING == 'true'
        env:
          HAS_SIGNING: ${{ secrets.IOS_P12_BASE64 != '' }}
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode from base64
          echo -n "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      # ── Build IPA (signed) ──
      - name: Build iOS IPA (Signed)
        if: env.HAS_SIGNING == 'true'
        env:
          HAS_SIGNING: ${{ secrets.IOS_P12_BASE64 != '' }}
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist

      # ── Build iOS (no codesign – CI validation only) ──
      - name: Build iOS (No Codesign)
        if: env.HAS_SIGNING != 'true'
        env:
          HAS_SIGNING: ${{ secrets.IOS_P12_BASE64 != '' }}
        run: |
          flutter build ios \
            --release \
            --no-codesign

      # ── Upload IPA artifact ──
      - name: Upload IPA Artifact
        if: env.HAS_SIGNING == 'true'
        env:
          HAS_SIGNING: ${{ secrets.IOS_P12_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: cj-joinery-ios-${{ github.run_number }}
          path: mobile-app/build/ios/ipa/*.ipa
          retention-days: 14

      # ── Create GitHub Release with IPA ──
      - name: Create Release
        if: env.HAS_SIGNING == 'true'
        env:
          HAS_SIGNING: ${{ secrets.IOS_P12_BASE64 != '' }}
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-app/build/ios/ipa/*.ipa
          name: iOS Release Build #${{ github.run_number }}
          tag_name: "ios-v${{ github.run_number }}"
          body: |
            🍎 **iOS Release Build**
            
            Automatic GitHub Actions release build of the CJ Joinery Mobile App (iOS).
            Build #${{ github.run_number }}
            
            **Install:** Download the IPA and install via Apple Configurator, TestFlight, or Xcode.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload to TestFlight (optional) ──
      # Uncomment this step after adding APP_STORE_CONNECT_API_KEY secrets
      # - name: Upload to TestFlight
      #   if: env.HAS_SIGNING == 'true'
      #   env:
      #     HAS_SIGNING: ${{ secrets.IOS_P12_BASE64 != '' }}
      #   run: |
      #     xcrun altool --upload-app \
      #       --type ios \
      #       --file build/ios/ipa/*.ipa \
      #       --apiKey ${{ secrets.APP_STORE_API_KEY_ID }} \
      #       --apiIssuer ${{ secrets.APP_STORE_ISSUER_ID }}

      # ── Cleanup Keychain ──
      - name: Cleanup Keychain
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          fi
